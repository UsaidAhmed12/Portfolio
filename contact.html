  <!-- Mini Hero -->
  <section class="hero-mini relative">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center gap-8 pt-16">
      <div class="hero-image-wrapper">
        <div class="hero-glow"></div>
        <div class="hero-avatar" id="avatar-wrapper" style="cursor:pointer;" title="Click to add your photo">
          <input type="file" id="avatar-input" accept="image/*" style="display:none" />
          <div class="avatar-placeholder" id="avatar-placeholder">
            <svg class="w-12 h-12 text-accent1 opacity-60" fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <p class="text-xs text-gray-400 mt-1">Click to add photo</p>
          </div>
          <img id="avatar-img" src="" alt="Usaid Ahmed" class="avatar-photo" style="display:none;" />
        </div>
        <div class="orbit-ring"></div>
        <div class="orbit-dot orbit-dot-1"></div>
        <div class="orbit-dot orbit-dot-2"></div>
        <div class="orbit-dot orbit-dot-3"></div>
      </div>
      <div>
        <h1 class="text-3xl md:text-4xl font-bold gradient-text">Usaid Ahmed</h1>
        <p class="text-lg text-gray-400 mt-1"><span id="typewriter"></span><span class="typewriter-cursor">|</span></p>
      </div>
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="py-24 relative">
    <div class="max-w-7xl mx-auto px-6">
      <div class="section-reveal">
        <h2 class="section-title">Get In Touch</h2>
        <div class="max-w-2xl mx-auto mt-12">
          <form id="contact-form" class="glass-card p-8 rounded-2xl space-y-6">
            <input type="text" name="_honey" style="display:none" />
            <div>
              <label for="name" class="block text-sm text-gray-400 mb-2">Name</label>
              <input type="text" id="name" name="from_name" required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-200 focus:outline-none focus:border-accent1 transition-colors placeholder-gray-600"
                placeholder="Your name" />
            </div>
            <div>
              <label for="email" class="block text-sm text-gray-400 mb-2">Email</label>
              <input type="email" id="email" name="from_email" required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-200 focus:outline-none focus:border-accent1 transition-colors placeholder-gray-600"
                placeholder="your@email.com" />
            </div>
            <div>
              <label for="message" class="block text-sm text-gray-400 mb-2">Message</label>
              <textarea id="message" name="message" rows="5" required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-200 focus:outline-none focus:border-accent1 transition-colors placeholder-gray-600 resize-none"
                placeholder="Your message..."></textarea>
            </div>
            <button type="submit" class="btn-primary w-full text-center">Send Message</button>
          </form>
          <div class="flex justify-center gap-6 mt-8">
            <a href="https://github.com/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="GitHub">
              <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            </a>
            <a href="https://linkedin.com/" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="LinkedIn">
              <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
            <a href="https://mail.google.com/mail/?view=cm&to=usaidahmed1008@gmail.com" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Email">
              <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

        </div>
